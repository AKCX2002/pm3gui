name: PM3 GUI Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: pm3gui-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/pm3gui-linux-x64-${TS}.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-linux
          path: pm3gui-linux-x64-*.tar.gz

  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-android
          path: build/app/outputs/flutter-apk/*.apk

  release-windows:
    name: Release Windows
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pm3gui-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: pm3gui-windows-x64.zip

  publish:
    name: Publish Release
    needs: [release-linux, release-android, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write # 最小权限：只有发布作业需要写权限
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.apk
            artifacts/*.zip
