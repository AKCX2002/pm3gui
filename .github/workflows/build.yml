# PM3 GUI — Flutter 构建 CI
#
# 触发条件: push/PR 到 main 分支, 且修改了 pm3gui/ 路径下的文件
# 构建平台: Linux (x64), Android (APK), Windows (exe)

name: PM3 GUI Build

on:
  push:
    branches: [main]
    paths: ['pm3gui/**']
  pull_request:
    branches: [main]
    paths: ['pm3gui/**']
  workflow_dispatch:

defaults:
  run:
    working-directory: pm3gui

jobs:
  # ================================================================
  #  Linux Desktop  (x64)
  # ================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Linux
        run: flutter build linux --release

      - name: Package artifacts
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../../pm3gui-linux-x64.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm3gui-linux-x64
          path: pm3gui/pm3gui-linux-x64.tar.gz

  # ================================================================
  #  Android APK
  # ================================================================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pm3gui-android-apk
          path: pm3gui/build/app/outputs/flutter-apk/*.apk

  # ================================================================
  #  Windows Desktop
  # ================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pm3gui-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm3gui-windows-x64
          path: pm3gui/pm3gui-windows-x64.zip
