name: PM3 GUI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # 定时校验“最新依赖”兼容性，防止长期不变导致 CI 老化
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  group: pm3gui-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Linux build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Optional dependency refresh (scheduled)
        if: github.event_name == 'schedule'
        run: flutter pub upgrade --major-versions

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Linux
        run: flutter build linux --release

      - name: Package artifacts
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/pm3gui-linux-x64-${TS}.tar.gz" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: pm3gui-linux-x64-${{ github.run_number }}
          path: pm3gui-linux-x64-*.tar.gz

  build-android:
    name: Android build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Optional dependency refresh (scheduled)
        if: github.event_name == 'schedule'
        run: flutter pub upgrade --major-versions

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pm3gui-android-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Windows build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Optional dependency refresh (scheduled)
        if: github.event_name == 'schedule'
        run: flutter pub upgrade --major-versions

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pm3gui-windows-x64-${{ github.run_number }}.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: pm3gui-windows-x64-${{ github.run_number }}
          path: pm3gui-windows-x64-*.zip
