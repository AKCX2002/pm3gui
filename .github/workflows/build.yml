# PM3 GUI — Flutter 构建 CI
#
# 触发条件: push/PR 到 main 分支时自动触发
# 构建平台: Linux (x64), Android (APK), Windows (exe)

name: PM3 GUI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ================================================================
  #  Linux Desktop  (x64)
  # ================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Linux
        run: flutter build linux --release

      - name: Package artifacts
        run: |
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/pm3gui-linux-x64.tar.gz" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: pm3gui-linux-x64
          path: pm3gui-linux-x64.tar.gz

  # ================================================================
  #  Android APK
  # ================================================================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v5
        with:
          name: pm3gui-android-apk
          path: build/app/outputs/flutter-apk/*.apk

  # ================================================================
  #  Windows Desktop
  # ================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pm3gui-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: pm3gui-windows-x64
          path: pm3gui-windows-x64.zip
